services:
  workspace:
    build: .
    container_name: bigdata_workspace
    ports:
      - "8888:8888"
      - "6080:6080"
      - "4040:4040"
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_TOKEN=
      - JUPYTER_PASSWORD=
      - JUPYTER_ALLOW_INSECURE_WRITES=true
      - JUPYTER_ENABLE_LAB=yes
      - DISPLAY=:99
    shm_size: "2gb"
    depends_on:
      - mongodb
    dns:
      - 8.8.8.8
    user: root
    restart: always
    networks:
      - bigdata_net

  mongodb:
    image: mongo:latest
    container_name: bigdata_mongodb
    platform: linux/amd64
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always
    networks:
      - bigdata_net

  visualizer:
    image: mongo-express:latest
    container_name: bigdata_ui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - VC_NODE_TLS_REJECT_UNAUTHORIZED=0
    dns:
      - 8.8.8.8
    restart: always
    networks:
      - bigdata_net

  filebrowser:
    image: filebrowser/filebrowser
    container_name: BigData_FileBrowser
    ports:
      - "8082:80"
    volumes:
      - .:/srv
    restart: always
    networks:
      - bigdata_net

volumes:
  mongo_data:

networks:
  bigdata_net:
    driver: bridge
    name: BigData_Network_UCN